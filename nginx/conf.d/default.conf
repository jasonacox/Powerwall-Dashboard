# HTTPS reverse-proxy: Grafana and pypowerwall-server on a single port 443.
# pypowerwall is mounted under /pypowerwall/ via PROXY_BASE_URL=/pypowerwall (set in pypowerwall.env).
# This tells the server to prefix all its API/asset paths with /pypowerwall, so the
# compiled animation JS calls /pypowerwall/api/... which nginx routes back to pypowerwall
# — no separate port needed, no /api/ namespace conflict with Grafana.
# Certificates are stored in /etc/nginx/ssl/

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # --- pypowerwall-server under /pypowerwall/ ---
    # Tesla's animation JS calls /pypowerwall/api/networks expecting an array it can
    # .map() over, but pypowerwall returns an object {}. Return [] directly
    # to prevent "TypeError: t.map is not a function" in the browser console.
    location ~ ^/pypowerwall/api/(networks|system/networks)$ {
        default_type application/json;
        return 200 '[]';
    }

    location /pypowerwall/ {
        # Trailing slash on proxy_pass strips the /pypowerwall/ prefix before forwarding
        proxy_pass http://pypowerwall:8675/;

        # Use $http_host (not $host) to preserve the port in forwarded headers
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (required for /ws/* real-time endpoints)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;

        # allow the animation to be embedded in a Grafana iframe
        proxy_hide_header X-Frame-Options;

        # Strip upstream CORS headers so nginx doesn't double them up
        # (pypowerwall-server also sets these; two values = browser rejects)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # CORS headers on all responses (including nginx-generated errors);
        # 'always' is required — without it headers are omitted on 4xx/5xx
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     '*'          always;
        add_header 'Access-Control-Allow-Headers'     '*'          always;
    }

    # Serve favicon from pypowerwall-server, fall back to Grafana on non-200
    location = /favicon.ico {
        proxy_pass http://pypowerwall:8675;
        proxy_intercept_errors on;
        error_page 301 302 303 304 400 401 403 404 500 502 503 504 = @grafana_favicon;
    }
    location @grafana_favicon {
        rewrite ^ /public/img/grafana_icon.svg break;
        proxy_pass http://grafana:9000;
    }

    # --- Grafana on / ---
    location / {
        proxy_pass http://grafana:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # websocket support (live dashboard updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
